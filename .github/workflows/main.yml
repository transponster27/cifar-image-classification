name: Sync to Hugging Face Hub

on:
  push:
    branches: [ "main" ]
  # Allows manual triggering from the GitHub Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout local code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Configure Git identity
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@://github.com"
          
          # 2. Add Hugging Face as a remote repository with authentication
          git remote add hf https://transponster27:$HF_TOKEN@huggingface.co/spaces/transponster27/cifar-image-classification
          
          # 3. Pull remote changes (e.g., Space UI edits) to prevent rejection
          # This uses 'rebase' to cleanly place your new GitHub commits on top of HF changes
          git pull hf main --rebase
          
          # 4. Push the combined code back to Hugging Face
          git push hf main
